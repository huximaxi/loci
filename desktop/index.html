<!DOCTYPE html>
<html lang="en" data-skin="wizard">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loci wizard</title>
  <style>
    /* ── RESET & WIZARD TOKENS ─────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; image-rendering: pixelated; }

    :root {
      --bg:           #060810;
      --bg-surface:   #0d1018;
      --bg-card:      #111520;
      --border:       #2a3045;
      --border-soft:  #1e2535;
      --text:         #e2ddd4;
      --text-dim:     #8a8575;
      --text-faint:   #4a4840;
      --accent:       #c87c2c;
      --accent-light: #e8974a;
      --room-hall:    rgba(200,130,44,0.10);
      --stone-crack:  rgba(255,255,255,0.04);
      --ivy-green:    #2d6e3d;
      --mono:         'Courier New', Courier, monospace;
    }

    /* ── BODY — scanlines ──────────────────────────────────────────────── */
    body {
      font-family: var(--mono);
      background-color: var(--bg);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      color: var(--text);
      height: 520px;
      width: 680px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── TITLEBAR ──────────────────────────────────────────────────────── */
    .titlebar {
      background: var(--bg-surface);
      border-bottom: 2px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 7px,
        var(--stone-crack) 7px, var(--stone-crack) 8px
      );
    }

    .title-crystal {
      width: 14px; height: 18px; flex-shrink: 0;
      animation: crystal-ambient 2.5s ease-in-out infinite;
    }

    @keyframes crystal-ambient {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(200,124,44,0.7)); }
      50%       { filter: drop-shadow(0 0 9px rgba(200,124,44,1.0)); }
    }

    .title-text {
      flex: 1;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
      text-align: center;
    }

    .title-version {
      font-size: 0.58rem;
      color: var(--text-faint);
      letter-spacing: 0.08em;
    }

    /* ── MAIN SCROLL AREA ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 20px 28px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: var(--bg); }
    .main::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── ROOM LABEL (pixel tag) ────────────────────────────────────────── */
    .room-label {
      display: inline-block;
      background: var(--text);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border: 2px solid var(--bg);
      outline: 1px solid var(--text);
      font-weight: bold;
      margin-bottom: 14px;
    }

    /* ── STONE CARDS ───────────────────────────────────────────────────── */
    .stone-card {
      background: var(--bg-surface);
      border: 2px solid var(--border);
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.6);
      background-image:
        repeating-linear-gradient(
          90deg, transparent, transparent 7px,
          var(--stone-crack) 7px, var(--stone-crack) 8px
        ),
        repeating-linear-gradient(
          0deg, transparent, transparent 7px,
          var(--stone-crack) 7px, var(--stone-crack) 8px
        );
    }

    .stone-card.hall-tint {
      background-color: color-mix(in srgb, var(--bg-surface), var(--room-hall));
      border-color: #4a3010;
    }

    .card-sublabel {
      font-size: 0.58rem;
      color: var(--text-faint);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: bold;
    }

    /* ── FOLDER PICKER ─────────────────────────────────────────────────── */
    .folder-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .folder-input {
      flex: 1;
      padding: 9px 11px;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 0.65rem;
      outline: none;
    }

    .folder-input:focus { border-color: var(--accent); color: var(--text); }

    /* ── BUTTONS ───────────────────────────────────────────────────────── */
    .btn {
      padding: 9px 14px;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
      transition: transform 0.08s, box-shadow 0.08s, color 0.1s, border-color 0.1s;
    }

    .btn:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--text-dim);
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    }

    .btn:active:not(:disabled) {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      border-color: #a86020;
      color: var(--bg);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.6);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--bg);
    }

    .btn-full { width: 100%; }

    /* ── RESULT CARD ───────────────────────────────────────────────────── */
    .result-card { display: none; }
    .result-card.show { display: block; }

    .badge-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      background: var(--text);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border: 2px solid var(--bg);
      outline: 1px solid var(--text);
      font-weight: bold;
    }

    .badge-found {
      background: #3a7a4a;
      color: #d4f0d8;
      border-color: #1a4a2a;
      outline-color: #3a7a4a;
    }

    .badge-none {
      background: #6a5a20;
      color: #f0d870;
      border-color: #3a3010;
      outline-color: #6a5a20;
    }

    .result-text {
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 7px 12px;
      min-width: 60px;
    }

    .stat-num {
      font-size: 1.1rem;
      color: var(--accent);
      font-weight: bold;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.52rem;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 3px;
    }

    .path-display {
      font-size: 0.6rem;
      color: #4a6b94;
      margin-bottom: 12px;
      word-break: break-all;
      padding: 4px 6px;
      background: var(--bg);
      border: 1px solid var(--border-soft);
    }

    .action-row {
      display: flex;
      gap: 6px;
    }

    /* ── IVY RULE ──────────────────────────────────────────────────────── */
    .ivy-rule {
      height: 16px;
      position: relative;
      margin: 4px 0 8px;
      overflow: visible;
    }

    .ivy-rule::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }

    .ivy-rule::after {
      content: '❧ · · · · · · · · · · · · · · · · · · ❧';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.5rem;
      color: var(--ivy-green);
      letter-spacing: 0.2em;
      white-space: nowrap;
      background: var(--bg);
      padding: 0 0.4rem;
    }

    /* ── FOOTER ────────────────────────────────────────────────────────── */
    .footer {
      border-top: 2px solid var(--border-soft);
      padding: 7px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 7px,
        var(--stone-crack) 7px, var(--stone-crack) 8px
      );
    }

    .footer-text {
      font-size: 0.58rem;
      color: var(--text-faint);
      letter-spacing: 0.06em;
    }

    .footer-accent { color: var(--accent); }
  </style>
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <svg class="title-crystal" viewBox="0 0 32 43" xmlns="http://www.w3.org/2000/svg">
      <polygon points="16,2  23,11 16,8  9,11"  fill="#ffee99"/>
      <polygon points="9,11  16,8  16,30 3,21"  fill="#e8861a"/>
      <polygon points="23,11 16,8  16,30 29,21" fill="#ffcc44"/>
      <polygon points="3,21  16,30 16,38 8,28"  fill="#c87c2c"/>
      <polygon points="29,21 16,30 16,38 24,28" fill="#e8861a"/>
      <polygon points="8,28  16,38 24,28 16,42" fill="#7a3a08"/>
      <polygon points="14,3  18,9  16,8"        fill="rgba(255,255,255,0.55)"/>
      <polygon points="11,13 15,10 13,20"       fill="rgba(255,255,255,0.25)"/>
      <rect    x="15" y="15" width="2" height="4" fill="rgba(255,238,153,0.6)"/>
    </svg>
    <div class="title-text">loci wizard</div>
    <div class="title-version">v0.2.0</div>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="room-label">▸ The Hall · Palace Migration</div>

    <!-- Picker card -->
    <div class="stone-card">
      <div class="card-sublabel">Select workspace folder</div>
      <div class="folder-row">
        <input
          id="folderPath"
          class="folder-input"
          type="text"
          placeholder="/Users/you/Dev"
          readonly
        >
        <button id="browseBtn" class="btn">Browse</button>
      </div>
      <button id="detectBtn" class="btn btn-primary btn-full" disabled>
        Detect Palace →
      </button>
    </div>

    <!-- Result card (hidden until detection runs) -->
    <div id="resultCard" class="stone-card hall-tint result-card">
      <div class="badge-row">
        <span id="resultBadge" class="badge">none</span>
        <span id="resultMeta" style="font-size:0.58rem;color:var(--text-faint);">—</span>
      </div>
      <p id="resultText" class="result-text"></p>

      <div id="statsSection" class="stats-row" style="display:none;">
        <div class="stat-box">
          <div id="roomCount" class="stat-num">—</div>
          <div class="stat-lbl">rooms</div>
        </div>
        <div class="stat-box">
          <div id="crystalCount" class="stat-num">—</div>
          <div class="stat-lbl">crystals</div>
        </div>
      </div>

      <div id="pathDisplay" class="path-display"></div>

      <div class="action-row">
        <button id="openFinderBtn" class="btn" style="flex:1;">Open in Finder</button>
        <button id="actionBtn" class="btn btn-primary" style="flex:2;" disabled>—</button>
      </div>
    </div>

    <div class="ivy-rule"></div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">loci.garden</span>
    <span class="footer-text">Hux × Vesper &nbsp;·&nbsp; <span class="footer-accent">✦</span></span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
