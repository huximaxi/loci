<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loci wizard</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        :root {
            color-scheme: light;
            --scholar-green: #4a6b54;
            --scholar-green-dim: #6b8b75;
            --scholar-cream: #faf9f6;
            --scholar-ink: #1f2a23;
            --scholar-muted: #6f7670;
            --scholar-warn: #a3503e;
            --scholar-border: rgba(31, 42, 35, 0.12);
            --scholar-border-strong: rgba(31, 42, 35, 0.28);
            --font-serif: "Iowan Old Style", "Charter", Georgia, serif;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--scholar-cream);
            color: var(--scholar-ink);
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100vh;
        }
        code {
            font-family: "SF Mono", Menlo, monospace;
            font-size: 0.85em;
            background: rgba(74, 107, 84, 0.08);
            padding: 1px 5px;
            border-radius: 3px;
        }
        a { color: var(--scholar-green); text-decoration: none; }
        a:hover { text-decoration: underline; }
        button {
            font: inherit;
            cursor: pointer;
            border-radius: 4px;
            padding: 8px 16px;
            border: 1px solid var(--scholar-border-strong);
            background: var(--scholar-cream);
            color: var(--scholar-ink);
            transition: background 120ms ease;
        }
        button:hover { background: rgba(74, 107, 84, 0.06); }
        button.primary {
            background: var(--scholar-green);
            color: var(--scholar-cream);
            border-color: var(--scholar-green);
        }
        button.primary:hover { background: var(--scholar-green-dim); }

        /* ─── Onboarding ──────────────────────────────────────────────── */
        .onboarding {
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .onboarding-header {
            text-align: center;
            margin-bottom: 16px;
        }
        .onboarding-header h1 {
            font-family: var(--font-serif);
            font-weight: 400;
            font-size: 24px;
            margin: 0 0 4px 0;
            color: var(--scholar-green);
        }
        .lede {
            margin: 0;
            font-style: italic;
            color: var(--scholar-muted);
            font-size: 13px;
        }
        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }
        .card {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px 14px;
            border: 1px solid var(--scholar-border);
            border-radius: 6px;
            background: white;
            color: var(--scholar-ink);
            text-decoration: none;
            transition: border-color 120ms ease, background 120ms ease;
        }
        .card:hover {
            border-color: var(--scholar-green-dim);
            background: rgba(74, 107, 84, 0.03);
            text-decoration: none;
        }
        .card-primary {
            border-color: var(--scholar-green-dim);
        }
        .card-quiet { opacity: 0.85; }
        .card-eyebrow {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--scholar-muted);
        }
        .card-title {
            font-family: var(--font-serif);
            font-size: 16px;
            color: var(--scholar-green);
        }
        .card-body {
            font-size: 12px;
            color: var(--scholar-ink);
            opacity: 0.85;
            line-height: 1.4;
        }
        .onboarding-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: var(--scholar-muted);
            letter-spacing: 0.02em;
        }

        /* ─── Wizard pages (load / create / about / dashboard) ─────────── */
        .wizard, .about, .dashboard-stub {
            padding: 20px 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .wizard-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--scholar-border);
            padding-bottom: 10px;
        }
        .wizard-header h2 {
            font-family: var(--font-serif);
            font-weight: 400;
            color: var(--scholar-green);
            margin: 0;
            font-size: 18px;
        }
        .back {
            font-size: 12px;
            color: var(--scholar-muted);
        }
        .wizard-body, .about-body {
            font-size: 13px;
            line-height: 1.55;
        }
        .wizard-body p, .about-body p { margin: 0 0 10px 0; }
        .wizard-body .primary { margin-top: 6px; }
        .wizard-body .secondary {
            margin-left: 8px;
            font-size: 12px;
            color: var(--scholar-muted);
        }
        .muted { color: var(--scholar-muted); }
        .warn { color: var(--scholar-warn); }

        /* ─── Dashboard stub ──────────────────────────────────────────── */
        .palace-stats {
            list-style: none;
            padding: 0;
            margin: 12px 0;
            display: flex;
            gap: 16px;
        }
        .palace-stats li {
            padding: 8px 12px;
            border: 1px solid var(--scholar-border);
            border-radius: 4px;
            background: white;
            font-size: 12px;
            color: var(--scholar-muted);
        }
        .palace-stats strong {
            display: block;
            font-family: var(--font-serif);
            font-size: 18px;
            color: var(--scholar-green);
            font-weight: 400;
        }

        /* ─── Dashboard ───────────────────────────────────────────────── */
        .dashboard {
            padding: 16px 20px 24px;
        }
        .palace-path {
            margin-left: auto;
            font-size: 11px;
            color: var(--scholar-muted);
            font-family: "SF Mono", Menlo, monospace;
        }
        .dashboard-warn {
            margin: 8px 0;
            padding: 6px 10px;
            border-left: 3px solid var(--scholar-warn);
            background: rgba(163, 80, 62, 0.06);
            font-size: 12px;
        }
        .kpi-strip {
            display: flex;
            gap: 10px;
            margin: 8px 0 16px;
        }
        .kpi {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--scholar-border);
            border-radius: 4px;
            background: white;
        }
        .kpi-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--scholar-muted);
        }
        .kpi-value {
            display: inline-block;
            font-family: var(--font-serif);
            font-size: 22px;
            color: var(--scholar-green);
            font-weight: 400;
            margin-top: 2px;
        }
        .kpi-value.muted { color: var(--scholar-muted); }
        .kpi-value.warn { color: var(--scholar-warn); }
        .kpi-delta {
            margin-left: 6px;
            font-size: 11px;
            color: var(--scholar-muted);
        }
        .kpi-delta.up { color: #4a8b54; }
        .kpi-delta.down { color: var(--scholar-warn); }

        .cron-section, .handovers-section {
            margin-top: 14px;
        }
        .cron-section h3, .handovers-section h3 {
            font-family: var(--font-serif);
            font-weight: 400;
            font-size: 14px;
            color: var(--scholar-green);
            margin: 0 0 6px 0;
            border-bottom: 1px solid var(--scholar-border);
            padding-bottom: 4px;
        }
        .cron-table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        .cron-table th {
            text-align: left;
            color: var(--scholar-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 9px;
            padding: 4px 6px;
            border-bottom: 1px solid var(--scholar-border);
        }
        .cron-table td {
            padding: 4px 6px;
            vertical-align: top;
            border-bottom: 1px solid rgba(31, 42, 35, 0.05);
        }
        .summary-cell {
            color: var(--scholar-ink);
            max-width: 280px;
            word-wrap: break-word;
        }
        .small { font-size: 10px; }

        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: rgba(31, 42, 35, 0.06);
            color: var(--scholar-muted);
        }
        .badge-ok { background: rgba(74, 139, 84, 0.14); color: #2f6d3a; }
        .badge-warn { background: rgba(204, 142, 50, 0.16); color: #8c5a16; }
        .badge-err { background: rgba(163, 80, 62, 0.16); color: var(--scholar-warn); }
        .pulse {
            margin-left: 4px;
            font-size: 9px;
            color: var(--scholar-muted);
            text-transform: uppercase;
        }

        .handovers-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .handovers-list li {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
            border-bottom: 1px solid rgba(31, 42, 35, 0.05);
        }
        .handovers-list li:last-child { border: 0; }
        .handover-name { color: var(--scholar-ink); }
    </style>
</head>
<body></body>
</html>
