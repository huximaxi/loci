name: secrets-scan

# Defensive scan for accidentally committed credentials.
# Cipher gate: ships with the github-governance PR.
# Runs on every push to main, every PR, and on a weekly schedule
# so a regression in detection rules surfaces within seven days.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history; gitleaks needs it to scan past commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is not required for public repos. If this repo
          # becomes private later, add a GITLEAKS_LICENSE secret.

  trufflehog:
    name: trufflehog (verified findings only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TruffleHog needs different inputs per event type. Passing
      # `base: main` on a push to main yields BASE == HEAD and the
      # action exits 1 by design. Split by event so each path runs
      # cleanly.

      - name: TruffleHog scan (PR diff)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog scan (push or schedule, full filesystem)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # Future hardening (commented for visibility; uncomment to activate):
  #
  # - CodeQL scanning for Rust + JavaScript (codeql-action/init + analyze)
  # - Dependency review on PRs (actions/dependency-review-action)
  # - SLSA provenance on release artefacts (slsa-framework/slsa-github-generator)
  # - Tauri DMG signing verification on release builds
